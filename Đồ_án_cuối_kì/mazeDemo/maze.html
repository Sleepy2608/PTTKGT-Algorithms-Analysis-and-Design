<!DOCTYPE html>
<html>
<head>
    <title>Giao hàng - Mô phỏng bằng mê cung</title>
    <link rel="stylesheet" href="stylemaze.css">
    <style>
        canvas {
            border: 1px solid black;
        }
        button {
            margin: 10px;
        }
    </style>
</head>
<body>

<br> <br>
<div class="top-controls">

    <div class="controls-box">
        <h2>Thuật toán</h2>
        <button onclick="generateMaze()">Tạo mê cung</button>
        <button onclick="solveMazeLocal('bfs')">BFS</button>
        <button onclick="solveMazeLocal('dfs')">DFS</button>
        <button onclick="solveMazeLocal('astar')">A*</button>
        <button onclick="runGreedy()">Clarke-Wright</button> <!--nhầm thuật toán nên đổi chỗ ngược lại-->
        <button onclick="runClarke()">Greedy</button>
    </div>
    
    <div class="controls-box">
        <h2>Độ khó</h2>
        <button onclick="generateMaze('easy')">Dễ</button>
        <button onclick="generateMaze('medium')">Trung bình</button>
        <button onclick="generateMaze('hard')">Khó</button>
    </div>

    <div class="controls-box">
        <h2>Giao hàng</h2>
        <button onclick="clearCustomers()">Xóa điểm</button>
        <button onclick="runVRP()">Tối ưu giao hàng</button>
    </div> 

</div>

<div class="canvas-container">
    <canvas id="mazeCanvas" width="600" height="600"></canvas>
</div>

<div id="resultBox" style="margin-top:20px; text-align:left; width:600px; margin:auto;">
    <h3>Kết quả phân tuyến:</h3>
    <div id="result"></div>
</div>

<script src="maze.js"></script>

</body>
</html>
